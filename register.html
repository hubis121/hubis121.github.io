<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Rejestracja</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<style>
body {
  background:#0f172a;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box { max-width:400px; width:100%; }

input {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}

.error {
  color:red;
  font-size:13px;
  min-height:16px;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
}
</style>
</head>

<body>
<div class="box">

<h2>Rejestracja</h2>

<input id="login" placeholder="Login">
<div class="error" id="login-error"></div>

<input id="email" placeholder="Email">
<div class="error" id="email-error"></div>

<input id="email2" placeholder="Powtórz email">
<div class="error" id="email2-error"></div>

<input type="password" id="password" placeholder="Hasło">
<div class="error" id="password-error"></div>

<input type="password" id="password2" placeholder="Powtórz hasło">
<div class="error" id="password2-error"></div>

<div class="g-recaptcha" data-sitekey="6LfxzpssAAAAAEaY2dRE3ROl-O14osVJb5l2Izc_"></div>
<div class="error" id="captcha-error"></div>

<button id="register">Utwórz konto</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  updateProfile
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
   apiKey: "AIzaSyBM-llo5yOdrwBbuAgGhspesvbqXOnM5go",
  authDomain: "hub-krzyzowki.firebaseapp.com",
  databaseURL: "https://hub-krzyzowki-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "hub-krzyzowki",
  storageBucket: "hub-krzyzowki.firebasestorage.app",
  messagingSenderId: "836287595684",
  appId: "1:836287595684:web:c6918e92dd86fcdbfad231"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

document.getElementById("register").onclick = async () => {
  const login = loginEl.value.trim();
  const email = emailEl.value.trim();
  const email2 = email2El.value.trim();
  const pass = passEl.value;
  const pass2 = pass2El.value;
  const captcha = grecaptcha.getResponse();

  let ok = true;

  if (login.length < 3) {
    loginError.innerText = "Min 3 znaki";
    ok = false;
  }

  const exists = await getDoc(doc(db, "users", login));
  if (exists.exists()) {
    loginError.innerText = "Login zajęty";
    ok = false;
  }

  if (email !== email2) {
    email2Error.innerText = "Maile różne";
    ok = false;
  }

  if (pass !== pass2) {
    password2Error.innerText = "Hasła różne";
    ok = false;
  }

  if (!captcha) {
    captchaError.innerText = "Potwierdź captcha";
    ok = false;
  }

  if (!ok) {
    grecaptcha.reset();
    return;
  }

  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);

    await updateProfile(cred.user, {
      displayName: login
    });

    await setDoc(doc(db, "users", login), {
      email: email
    });

    location.href = "/";
  } catch (e) {
    emailError.innerText = e.message;
    grecaptcha.reset();
  }
};
</script>

</body>
</html>
