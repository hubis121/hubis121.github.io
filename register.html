<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Rejestracja - Hub Krzyżówki</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- reCAPTCHA -->
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    .error {
      color: #ef4444;
      font-size: 13px;
      text-align: left;
      min-height: 16px;
      margin-bottom: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .back {
      margin-top: 15px;
      display: block;
      color: #22c55e;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>📝 Rejestracja</h1>

    <input type="email" id="email" placeholder="Email">
    <div class="error" id="email-error"></div>

    <input type="email" id="email2" placeholder="Powtórz email">
    <div class="error" id="email2-error"></div>

    <input type="password" id="password" placeholder="Hasło">
    <div class="error" id="password-error"></div>

    <input type="password" id="password2" placeholder="Powtórz hasło">
    <div class="error" id="password2-error"></div>

    <!-- CAPTCHA -->
    <div class="g-recaptcha" data-sitekey="6LfxzpssAAAAAEaY2dRE3ROI-O14osVJb5I2lzc_"></div>

    <button id="register">Utwórz konto</button>

    <a href="/" class="back">⬅ Powrót do strony głównej</a>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBM-llo5yOdrwBbuAgGhspesvbqXOnM5go",
  authDomain: "hub-krzyzowki.firebaseapp.com",
  databaseURL: "https://hub-krzyzowki-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "hub-krzyzowki",
  storageBucket: "hub-krzyzowki.firebasestorage.app",
  messagingSenderId: "836287595684",
  appId: "1:836287595684:web:c6918e92dd86fcdbfad231"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById("register").onclick = () => {
      const email = document.getElementById("email").value.trim();
      const email2 = document.getElementById("email2").value.trim();
      const password = document.getElementById("password").value;
      const password2 = document.getElementById("password2").value;
      const captcha = grecaptcha.getResponse();

      // reset błędów
      document.getElementById("email-error").innerText = "";
      document.getElementById("email2-error").innerText = "";
      document.getElementById("password-error").innerText = "";
      document.getElementById("password2-error").innerText = "";

      let ok = true;

      if (!email.includes("@")) {
        document.getElementById("email-error").innerText = "Niepoprawny email";
        ok = false;
      }

      if (email !== email2) {
        document.getElementById("email2-error").innerText = "Maile nie są takie same";
        ok = false;
      }

      if (password.length < 6) {
        document.getElementById("password-error").innerText = "Min. 6 znaków";
        ok = false;
      }

      if (password !== password2) {
        document.getElementById("password2-error").innerText = "Hasła nie są takie same";
        ok = false;
      }

      if (!captcha) {
        alert("Potwierdź captcha!");
        ok = false;
      }

      if (!ok) return;

      createUserWithEmailAndPassword(auth, email, password)
        .then(() => {
          window.location.href = "/";
        })
        .catch(err => {
          document.getElementById("email-error").innerText = err.message;
        });
    };
  </script>
</body>
</html>
