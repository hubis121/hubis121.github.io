<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Hub Krzyżówki</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 600px;
    }
    h1 {
      font-size: 3rem;
    }
    p {
      opacity: 0.7;
    }
    button, a {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background: #22c55e;
      color: black;
      border: none;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover, a:hover {
      background: #16a34a;
    }
    .footer {
      margin-top: 30px;
      font-size: 0.9rem;
      opacity: 0.6;
    }
    .footer a {
      background: none;
      color: #94a3b8;
      padding: 0;
      margin: 0 5px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🧩 Hub Krzyżówki</h1>

    <p id="userInfo">Nie jesteś zalogowany</p>

    <button id="loginBtn">Zaloguj się Google</button>
    <button id="logoutBtn" style="display:none;">Wyloguj</button>

    <br>

    <a href="https://hub-krzyzowki.firebaseapp.com" target="_blank">
      Przejdź do aplikacji Hub Krzyżówki
    </a>

    <!-- 📜 LINKI DLA GOOGLE -->
    <div class="footer">
      <a href="/privacy.html">Polityka prywatności</a> |
      <a href="/terms.html">Warunki korzystania</a>
    </div>
  </div>

  <!-- 🔥 Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { 
      getAuth, 
      signInWithPopup, 
      GoogleAuthProvider, 
      signOut, 
      onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
 apiKey: "AIzaSyBM-llo5yOdrwBbuAgGhspesvbqXOnM5go",
  authDomain: "hub-krzyzowki.firebaseapp.com",
  databaseURL: "https://hub-krzyzowki-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "hub-krzyzowki",
  storageBucket: "hub-krzyzowki.firebasestorage.app",
  messagingSenderId: "836287595684",
  appId: "1:836287595684:web:c6918e92dd86fcdbfad231"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const userInfo = document.getElementById("userInfo");

    // 🔐 logowanie
    loginBtn.addEventListener("click", async () => {
      try {
        await signInWithPopup(auth, provider);
      } catch (err) {
        alert("Błąd: " + err.message);
      }
    });

    // 🚪 wylogowanie
    logoutBtn.addEventListener("click", async () => {
      await signOut(auth);
    });

    // 👀 stan użytkownika
    onAuthStateChanged(auth, (user) => {
      if (user) {
        userInfo.textContent = "Zalogowany jako: " + user.displayName;
        loginBtn.style.display = "none";
        logoutBtn.style.display = "inline-block";
      } else {
        userInfo.textContent = "Nie jesteś zalogowany";
        loginBtn.style.display = "inline-block";
        logoutBtn.style.display = "none";
      }
    });
  </script>

</body>
</html>
