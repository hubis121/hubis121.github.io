<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Hub Krzyżówki</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
    }

    #crossword {
      display: grid;
      grid-template-columns: repeat(5, 40px);
      gap: 5px;
      justify-content: center;
      margin: 20px 0;
    }

    input {
      width: 40px;
      height: 40px;
      text-align: center;
      font-size: 20px;
      text-transform: uppercase;
    }

    .black {
      background: black;
    }

    button {
      margin: 5px;
      padding: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🧩 Hub Krzyżówki</h1>

<button onclick="login()">Zaloguj się</button>
<button onclick="logout()">Wyloguj</button>

<p id="user">Nie jesteś zalogowany</p>

<div id="crossword"></div>

<button onclick="checkAnswers()">Sprawdź</button>

<div id="result"></div>

<script>
// 🧩 układ
const layout = [
  ["", "", "", "", ""],
  ["", "#", "", "#", ""],
  ["", "", "", "", ""],
  ["", "#", "", "#", ""],
  ["", "", "", "", ""]
];

// ✅ odpowiedzi
const answers = [
  ["K", "O", "T", "A", "K"],
  ["A", "#", "L", "#", "O"],
  ["M", "A", "K", "A", "R"],
  ["A", "#", "O", "#", "A"],
  ["L", "A", "S", "E", "R"]
];

// 🧱 generowanie
const crossword = document.getElementById("crossword");

layout.forEach(row => {
  row.forEach(cell => {
    if (cell === "#") {
      const div = document.createElement("div");
      div.classList.add("black");
      crossword.appendChild(div);
    } else {
      const input = document.createElement("input");
      input.maxLength = 1;
      crossword.appendChild(input);
    }
  });
});

// 🧠 sprawdzanie
function checkAnswers() {
  const inputs = document.querySelectorAll("#crossword input");
  let index = 0;
  let correct = true;

  layout.forEach((row, i) => {
    row.forEach((cell, j) => {
      if (cell !== "#") {
        const value = inputs[index].value.toUpperCase();

        if (value !== answers[i][j]) {
          correct = false;
          inputs[index].style.background = "salmon";
        } else {
          inputs[index].style.background = "lightgreen";
        }

        index++;
      }
    });
  });

  if (correct) {
    saveScore(100);
  }
}
</script>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

// config
const firebaseConfig = {
  apiKey: "AIzaSyBM-llo5yOdrwBbuAgGhspesvbqXOnM5go",
  authDomain: "hub-krzyzowki.firebaseapp.com",
  databaseURL: "https://hub-krzyzowki-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "hub-krzyzowki",
  storageBucket: "hub-krzyzowki.firebasestorage.app",
  messagingSenderId: "836287595684",
  appId: "1:836287595684:web:c6918e92dd86fcdbfad231"
};

// init
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth();
const provider = new GoogleAuthProvider();

// 🔐 logowanie
window.login = function() {
  signInWithPopup(auth, provider);
}

// 🚪 wylogowanie
window.logout = function() {
  signOut(auth);
}

// 👤 stan użytkownika
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("user").innerText =
      "Zalogowany: " + user.displayName;
  } else {
    document.getElementById("user").innerText =
      "Nie jesteś zalogowany";
  }
});

// 💾 zapis
window.saveScore = function(score) {
  push(ref(db, 'scores'), {
    nick: auth.currentUser ? auth.currentUser.displayName : "Gość",
    wynik: score,
    czas: Date.now()
  });
}

// 🏆 ranking
onValue(ref(db, 'scores'), (snapshot) => {
  const data = snapshot.val();
  if (!data) return;

  let arr = Object.values(data);

  // sort malejąco
  arr.sort((a, b) => b.wynik - a.wynik);

  let html = "<h3>🏆 TOP 10</h3>";

  arr.slice(0, 10).forEach((item, i) => {
    html += (i+1) + ". " + item.nick + " - " + item.wynik + "<br>";
  });

  document.getElementById("result").innerHTML = html;
});
</script>

</body>
</html>
