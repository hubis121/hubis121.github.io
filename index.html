<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Hub Krzyżówki</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b132b;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  width:100%;
  max-width:380px;
  text-align:center;
}

h1 {
  margin-bottom:10px;
}

/* INPUTY */
input {
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  box-sizing:border-box;
}

/* PRZYCISKI */
button {
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  font-size:14px;
}

/* GOOGLE */
.google {
  background:white;
  color:#444;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

/* LOGIN */
.login {
  background:#22c55e;
}

/* REGISTER */
.register {
  background:#3b82f6;
}

/* MODAL (nick) */
.modal {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box {
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  width:300px;
  text-align:center;
}

.error {
  color:#ef4444;
  font-size:13px;
  min-height:16px;
}
</style>
</head>

<body>

<div class="box">
  <h1>🧩 Hub Krzyżówki</h1>

  <!-- GOOGLE -->
  <button class="google" id="googleLogin">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
    Zaloguj się przez Google
  </button>

  <!-- INPUTY -->
  <input id="loginEmail" placeholder="Email lub login">
  <input type="password" id="password" placeholder="Hasło">

  <!-- PRZYCISKI -->
  <button class="login" id="loginBtn">Zaloguj</button>
  <button class="register" onclick="location.href='register.html'">Zarejestruj</button>
</div>

<!-- MODAL LOGIN -->
<div class="modal" id="nickModal">
  <div class="modal-box">
    <h3>Wybierz login</h3>
    <input id="nickInput" placeholder="Twój login">
    <div class="error" id="nickError"></div>
    <button id="saveNick">Zapisz</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup,
  updateProfile
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBM-llo5yOdrwBbuAgGhspesvbqXOnM5go",
  authDomain: "hub-krzyzowki.firebaseapp.com",
  databaseURL: "https://hub-krzyzowki-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "hub-krzyzowki",
  storageBucket: "hub-krzyzowki.firebasestorage.app",
  messagingSenderId: "836287595684",
  appId: "1:836287595684:web:c6918e92dd86fcdbfad231"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let googleUser = null;

// GOOGLE LOGIN
document.getElementById("googleLogin").onclick = async () => {
  const provider = new GoogleAuthProvider();
  const result = await signInWithPopup(auth, provider);

  googleUser = result.user;

  // sprawdź czy ma login w bazie
  const snap = await getDoc(doc(db, "users", googleUser.uid));

  if (!snap.exists()) {
    // pokaż modal
    document.getElementById("nickModal").style.display = "flex";
  } else {
    location.href = "/";
  }
};

// ZAPIS LOGINU GOOGLE
document.getElementById("saveNick").onclick = async () => {
  const nick = document.getElementById("nickInput").value.trim();

  if (nick.length < 3) {
    nickError.innerText = "Min 3 znaki";
    return;
  }

  // sprawdź czy zajęty
  const exists = await getDoc(doc(db, "users", nick));
  if (exists.exists()) {
    nickError.innerText = "Login zajęty";
    return;
  }

  // zapis
  await updateProfile(googleUser, { displayName: nick });

  await setDoc(doc(db, "users", nick), {
    email: googleUser.email
  });

  location.href = "/";
};

// LOGIN EMAIL / LOGIN
document.getElementById("loginBtn").onclick = async () => {
  const input = loginEmail.value.trim();
  const pass = password.value;

  let email = input;

  try {
    if (!input.includes("@")) {
      const snap = await getDoc(doc(db, "users", input));

      if (!snap.exists()) {
        alert("Login nie istnieje");
        return;
      }

      email = snap.data().email;
    }

    await signInWithEmailAndPassword(auth, email, pass);
    location.href = "/";
  } catch (e) {
    alert(e.message);
  }
};
</script>

</body>
</html>
