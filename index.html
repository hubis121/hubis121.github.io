<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Hub Krzyżówki</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b132b;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  width:100%;
  max-width:380px;
  text-align:center;
}

input {
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
}

button {
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.google {
  background:white;
  color:#444;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.login { background:#22c55e; }
.register { background:#3b82f6; }
.logout { background:#ef4444; }

/* panel usera */
.user-panel {
  display:none;
}
</style>
</head>

<body>

<div class="box">

  <h1>🧩 Hub Krzyżówki</h1>

  <!-- PANEL LOGOWANIA -->
  <div id="authBox">

    <button class="google" id="googleLogin">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
      Zaloguj się przez Google
    </button>

    <input id="loginEmail" placeholder="Email lub login">
    <input type="password" id="password" placeholder="Hasło">

    <button class="login" id="loginBtn">Zaloguj</button>
    <button class="register" onclick="location.href='register.html'">Zarejestruj</button>

  </div>

  <!-- PANEL UŻYTKOWNIKA -->
  <div id="userPanel" class="user-panel">
    <h2 id="welcomeText"></h2>
    <button class="logout" id="logoutBtn">Wyloguj</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup,
  updateProfile,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBM-llo5yOdrwBbuAgGhspesvbqXOnM5go",
  authDomain: "hub-krzyzowki.firebaseapp.com",
  databaseURL: "https://hub-krzyzowki-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "hub-krzyzowki",
  storageBucket: "hub-krzyzowki.firebasestorage.app",
  messagingSenderId: "836287595684",
  appId: "1:836287595684:web:c6918e92dd86fcdbfad231"
};
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let googleUser = null;

// 🔥 OBSŁUGA STANU
onAuthStateChanged(auth, async (user) => {

  if (user) {
    const snap = await getDoc(doc(db, "users", user.uid));

    if (snap.exists()) {
      const login = snap.data().login;

      // pokaż panel usera
      document.getElementById("authBox").style.display = "none";
      document.getElementById("userPanel").style.display = "block";

      document.getElementById("welcomeText").innerText = "Witaj, " + login + " 😎";
    }

  } else {
    // brak usera → pokaż logowanie
    document.getElementById("authBox").style.display = "block";
    document.getElementById("userPanel").style.display = "none";
  }
});

// 🔵 GOOGLE LOGIN
document.getElementById("googleLogin").onclick = async () => {
  const provider = new GoogleAuthProvider();

  const result = await signInWithPopup(auth, provider);
  googleUser = result.user;

  const snap = await getDoc(doc(db, "users", googleUser.uid));

  if (!snap.exists()) {
    const nick = prompt("Podaj login:");

    if (!nick || nick.length < 3) {
      alert("Login min 3 znaki");
      return;
    }

    await setDoc(doc(db, "users", googleUser.uid), {
      login: nick,
      email: googleUser.email
    });

    await setDoc(doc(db, "logins", nick), {
      uid: googleUser.uid,
      email: googleUser.email
    });

    await updateProfile(googleUser, {
      displayName: nick
    });
  }
};

// 🟢 LOGIN
document.getElementById("loginBtn").onclick = async () => {
  const input = loginEmail.value.trim();
  const pass = password.value;

  let email = input;

  if (!input.includes("@")) {
    const snap = await getDoc(doc(db, "logins", input));

    if (!snap.exists()) {
      alert("Login nie istnieje");
      return;
    }

    email = snap.data().email;
  }

  await signInWithEmailAndPassword(auth, email, pass);
};

// 🔴 LOGOUT
document.getElementById("logoutBtn").onclick = () => {
  signOut(auth);
};
</script>

</body>
</html>
