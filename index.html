<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Hub Krzyżówki</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 600px;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }
    p {
      opacity: 0.7;
    }
    a {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #22c55e;
      color: black;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }
    a:hover {
      background: #16a34a;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧩 Hub Krzyżówki</h1>
    <p>Twoja strona działa na GitHub Pages 🚀</p>
    <a href="#">Zacznij</a>
  </div>
</body>
</html>
