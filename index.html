<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Hub Krzyżówki</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b132b;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      text-align: center;
      width: 100%;
      max-width: 400px;
    }

    h1 {
      font-size: 32px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .google {
      background: white;
      color: black;
    }

    .login {
      background: #22c55e;
      color: white;
    }

    .register {
      background: #3b82f6;
      color: white;
    }

    .links {
      margin-top: 15px;
      font-size: 14px;
    }

    .links a {
      color: #22c55e;
      text-decoration: none;
      margin: 0 5px;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>🧩 Hub Krzyżówki</h1>
    <p>Witamy 🚀</p>

    <!-- GOOGLE -->
    <button class="google" id="googleLogin">
  <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" 
       style="width:20px; vertical-align:middle; margin-right:8px;">
  Zaloguj się przez Google
  </button>

    <!-- EMAIL / LOGIN -->
    <input type="text" id="loginEmail" placeholder="Email lub login">

    <!-- HASŁO -->
    <input type="password" id="password" placeholder="Hasło">

    <!-- ZALOGUJ -->
    <button class="login" id="loginBtn">Zaloguj</button>

    <!-- REJESTRACJA -->
    <button class="register" onclick="window.location.href='register.html'">
      Zarejestruj
    </button>

    <div class="links">
      <a href="privacy.html">Polityka prywatności</a> |
      <a href="terms.html">Regulamin</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { 
      getAuth, 
      signInWithEmailAndPassword,
      GoogleAuthProvider,
      signInWithPopup 
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
       apiKey: "AIzaSyBM-llo5yOdrwBbuAgGhspesvbqXOnM5go",
  authDomain: "hub-krzyzowki.firebaseapp.com",
  databaseURL: "https://hub-krzyzowki-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "hub-krzyzowki",
  storageBucket: "hub-krzyzowki.firebasestorage.app",
  messagingSenderId: "836287595684",
  appId: "1:836287595684:web:c6918e92dd86fcdbfad231"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // GOOGLE LOGIN
    document.getElementById("googleLogin").onclick = () => {
      const provider = new GoogleAuthProvider();
      signInWithPopup(auth, provider)
        .then(() => {
          window.location.href = "/";
        });
    };

    // LOGIN EMAIL
    document.getElementById("loginBtn").onclick = () => {
      const loginEmail = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("password").value;

      // 🔥 jeśli wpisze login zamiast email → NIE zadziała (firebase wymaga email)
      // można później rozbudować o bazę loginów

      signInWithEmailAndPassword(auth, loginEmail, password)
        .then(() => {
          window.location.href = "/";
        })
        .catch(err => {
          alert("Błąd: " + err.message);
        });
    };
  </script>
</body>
</html>
