<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Hub Krzyżówki</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b132b;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  width:100%;
  max-width:380px;
  text-align:center;
}

input {
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
}

button {
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.google {
  background:white;
  color:#444;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.login { background:#22c55e; }
.register { background:#3b82f6; }
.logout { background:#ef4444; }

.user-panel { display:none; }
</style>
</head>

<body>

<div class="box">

<h1>🧩 Hub Krzyżówki</h1>

<div id="authBox">

<button class="google" id="googleLogin">
<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
Zaloguj się przez Google
</button>

<input id="loginEmail" placeholder="Email lub login">
<input type="password" id="password" placeholder="Hasło">

<button class="login" id="loginBtn">Zaloguj</button>
<button class="register" onclick="location.href='register.html'">Zarejestruj</button>

</div>

<div id="userPanel" class="user-panel">
<h2 id="welcomeText"></h2>
<button class="logout" id="logoutBtn">Wyloguj</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBM-llo5yOdrwBbuAgGhspesvbqXOnM5go",
  authDomain: "hub-krzyzowki.firebaseapp.com",
  databaseURL: "https://hub-krzyzowki-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "hub-krzyzowki",
  storageBucket: "hub-krzyzowki.firebasestorage.app",
  messagingSenderId: "836287595684",
  appId: "1:836287595684:web:c6918e92dd86fcdbfad231"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


// ⚡ NATYCHMIASTOWY UI
onAuthStateChanged(auth, async (user) => {

  if (user) {

    authBox.style.display = "none";
    userPanel.style.display = "block";

    // ⚡ szybki tekst od razu
    let login = user.displayName || "Użytkownik";
    welcomeText.innerText = "Witaj, " + login + " 😎";

    // 🔄 poprawka z Firestore w tle
    try {
      const snap = await getDoc(doc(db, "users", user.uid));

      if (snap.exists()) {
        welcomeText.innerText = "Witaj, " + snap.data().login + " 😎";
      }

    } catch (e) {
      console.log("Firestore error:", e);
    }

  } else {
    authBox.style.display = "block";
    userPanel.style.display = "none";
  }
});


// 🔵 GOOGLE LOGIN (działa zawsze)
document.getElementById("googleLogin").onclick = async () => {
  const provider = new GoogleAuthProvider();

  try {
    const result = await signInWithPopup(auth, provider);
    const user = result.user;

    // ⚡ natychmiast feedback
    welcomeText.innerText = "Logowanie... 😎";

    try {
      const snap = await getDoc(doc(db, "users", user.uid));

      if (!snap.exists()) {
        let nick = prompt("Podaj login:");

        if (!nick || nick.length < 3) return;

        const check = await getDoc(doc(db, "logins", nick));
        if (check.exists()) {
          alert("Login zajęty");
          return;
        }

        await setDoc(doc(db, "users", user.uid), {
          login: nick,
          email: user.email
        });

        await setDoc(doc(db, "logins", nick), {
          uid: user.uid,
          email: user.email
        });
      }

    } catch (e) {
      console.log("Firestore error:", e);
    }

  } catch (e) {
    alert("Błąd Google: " + e.message);
  }
};


// 🟢 LOGIN EMAIL / LOGIN
document.getElementById("loginBtn").onclick = async () => {
  const input = loginEmail.value.trim();
  const pass = password.value;

  let email = input;

  try {
    if (!input.includes("@")) {
      const snap = await getDoc(doc(db, "logins", input));

      if (!snap.exists()) {
        alert("Login nie istnieje");
        return;
      }

      email = snap.data().email;
    }

    await signInWithEmailAndPassword(auth, email, pass);

  } catch (e) {
    alert("Błąd: " + e.message);
  }
};


// 🔴 WYLOGUJ
document.getElementById("logoutBtn").onclick = () => {
  signOut(auth);
};
</script>

</body>
</html>
