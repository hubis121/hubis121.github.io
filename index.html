<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Hub Krzyżówki</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b132b;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      text-align: center;
      width: 100%;
      max-width: 400px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .google {
      background: white;
      color: #444;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .login {
      background: #22c55e;
    }

    .register {
      background: #3b82f6;
    }
  </style>
</head>

<body>
<div class="box">
  <h1>🧩 Hub Krzyżówki</h1>

  <!-- GOOGLE -->
  <button class="google" id="googleLogin">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
    Zaloguj się przez Google
  </button>

  <!-- LOGIN / EMAIL -->
  <input type="text" id="loginEmail" placeholder="Email lub login">

  <!-- HASŁO -->
  <input type="password" id="password" placeholder="Hasło">

  <!-- LOGIN -->
  <button class="login" id="loginBtn">Zaloguj</button>

  <!-- REGISTER -->
  <button class="register" onclick="location.href='register.html'">
    Zarejestruj
  </button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
   apiKey: "AIzaSyBM-llo5yOdrwBbuAgGhspesvbqXOnM5go",
  authDomain: "hub-krzyzowki.firebaseapp.com",
  databaseURL: "https://hub-krzyzowki-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "hub-krzyzowki",
  storageBucket: "hub-krzyzowki.firebasestorage.app",
  messagingSenderId: "836287595684",
  appId: "1:836287595684:web:c6918e92dd86fcdbfad231"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// GOOGLE LOGIN
document.getElementById("googleLogin").onclick = () => {
  const provider = new GoogleAuthProvider();
  signInWithPopup(auth, provider).then(() => {
    location.href = "/";
  });
};

// LOGIN EMAIL / LOGIN
document.getElementById("loginBtn").onclick = async () => {
  const input = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("password").value;

  let email = input;

  try {
    // jeśli login (bez @)
    if (!input.includes("@")) {
      const snap = await getDoc(doc(db, "users", input));

      if (!snap.exists()) {
        alert("Login nie istnieje");
        return;
      }

      email = snap.data().email;
    }

    await signInWithEmailAndPassword(auth, email, password);
    location.href = "/";

  } catch (e) {
    alert("Błąd: " + e.message);
  }
};
</script>

</body>
</html>
