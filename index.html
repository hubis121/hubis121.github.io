<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Hub Krzyżówki</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b132b;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  width:100%;
  max-width:380px;
  text-align:center;
}

input {
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  box-sizing:border-box;
}

button {
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.google {
  background:white;
  color:#444;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.login {
  background:#22c55e;
}

.register {
  background:#3b82f6;
}

.modal {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box {
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  width:300px;
}

.error {
  color:#ef4444;
  font-size:13px;
  min-height:16px;
}
</style>
</head>

<body>

<div class="box">
  <h1>🧩 Hub Krzyżówki</h1>

  <!-- GOOGLE -->
  <button class="google" id="googleLogin">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
    Zaloguj się przez Google
  </button>

  <!-- INPUTY -->
  <input id="loginEmail" placeholder="Email lub login">
  <input type="password" id="password" placeholder="Hasło">

  <!-- PRZYCISKI -->
  <button class="login" id="loginBtn">Zaloguj</button>
  <button class="register" onclick="location.href='register.html'">Zarejestruj</button>
</div>

<!-- MODAL LOGIN -->
<div class="modal" id="nickModal">
  <div class="modal-box">
    <h3>Wybierz login</h3>
    <input id="nickInput" placeholder="Twój login">
    <div class="error" id="nickError"></div>
    <button id="saveNick">Zapisz</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup,
  updateProfile,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
   apiKey: "AIzaSyBM-llo5yOdrwBbuAgGhspesvbqXOnM5go",
  authDomain: "hub-krzyzowki.firebaseapp.com",
  databaseURL: "https://hub-krzyzowki-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "hub-krzyzowki",
  storageBucket: "hub-krzyzowki.firebasestorage.app",
  messagingSenderId: "836287595684",
  appId: "1:836287595684:web:c6918e92dd86fcdbfad231"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let googleUser = null;

// 🔥 OBSŁUGA STANU LOGOWANIA
onAuthStateChanged(auth, async (user) => {
  if (!user) return;

  const snap = await getDoc(doc(db, "users", user.uid));

  if (snap.exists()) {
    // użytkownik już ma login → wpuszczamy
    window.location.href = "/";
  }
});

// 🔵 GOOGLE LOGIN
document.getElementById("googleLogin").onclick = async () => {
  const provider = new GoogleAuthProvider();

  try {
    const result = await signInWithPopup(auth, provider);
    googleUser = result.user;

    const snap = await getDoc(doc(db, "users", googleUser.uid));

    if (!snap.exists()) {
      // nowy użytkownik → wybór loginu
      document.getElementById("nickModal").style.display = "flex";
    }

  } catch (e) {
    alert("Błąd Google: " + e.message);
  }
};

// 💾 ZAPIS LOGINU GOOGLE
document.getElementById("saveNick").onclick = async () => {
  const nick = document.getElementById("nickInput").value.trim();
  const error = document.getElementById("nickError");

  error.innerText = "";

  if (nick.length < 3) {
    error.innerText = "Min 3 znaki";
    return;
  }

  // sprawdź czy login zajęty
  const check = await getDoc(doc(db, "logins", nick));
  if (check.exists()) {
    error.innerText = "Login zajęty";
    return;
  }

  // zapis usera
  await setDoc(doc(db, "users", googleUser.uid), {
    login: nick,
    email: googleUser.email
  });

  // mapa login → uid
  await setDoc(doc(db, "logins", nick), {
    uid: googleUser.uid,
    email: googleUser.email
  });

  await updateProfile(googleUser, {
    displayName: nick
  });

  window.location.href = "/";
};

// 🟢 LOGIN EMAIL / LOGIN
document.getElementById("loginBtn").onclick = async () => {
  const input = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("password").value;

  let email = input;

  try {
    if (!input.includes("@")) {
      const snap = await getDoc(doc(db, "logins", input));

      if (!snap.exists()) {
        alert("Login nie istnieje");
        return;
      }

      email = snap.data().email;
    }

    await signInWithEmailAndPassword(auth, email, password);
    window.location.href = "/";

  } catch (e) {
    alert("Błąd: " + e.message);
  }
};
</script>

</body>
</html>
