<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Hub Krzyżówki</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b132b;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  width:100%;
  max-width:380px;
  text-align:center;
}

input, button {
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  font-size:15px;
  box-sizing:border-box;
}

button {
  font-weight:bold;
  cursor:pointer;
}

.google {
  background:white;
  color:#444;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.login { background:#22c55e; }
.register { background:#3b82f6; }
.logout { background:#ef4444; }

.user-panel { display:none; }

.info {
  font-size:13px;
  margin-top:5px;
  min-height:18px;
}

.links {
  margin-top:15px;
  font-size:14px;
  opacity:0.7;
}

.links a {
  color:#22c55e;
  text-decoration:none;
  margin:0 5px;
}

.links a:hover {
  text-decoration:underline;
}
</style>
</head>

<body>

<div class="box">

<h1>🧩 Hub Krzyżówki</h1>

<div id="authBox">

<button class="google" id="googleLogin">
<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
Zaloguj się przez Google
</button>

<input id="loginEmail" placeholder="Email lub login">
<input type="password" id="password" placeholder="Hasło">

<div id="loginInfo" class="info"></div>

<button class="login" id="loginBtn">Zaloguj</button>

<button id="resetBtn">Resetuj hasło</button>
<div id="resetInfo" class="info"></div>

<button class="register" onclick="location.href='register.html'">Zarejestruj</button>

</div>

<div id="userPanel" class="user-panel">
<h2 id="welcomeText"></h2>
<button class="logout" id="logoutBtn">Wyloguj</button>
</div>

<div class="links">
  <a href="/privacy.html">Polityka prywatności</a> |
  <a href="/terms.html">Regulamin</a>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup,
  signOut,
  onAuthStateChanged,
  sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "AIzaSyBM-llo5yOdrwBbuAgGhspesvbqXOnM5go",
  authDomain: "hub-krzyzowki.firebaseapp.com",
  databaseURL: "https://hub-krzyzowki-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "hub-krzyzowki",
  storageBucket: "hub-krzyzowki.firebasestorage.app",
  messagingSenderId: "836287595684",
  appId: "1:836287595684:web:c6918e92dd86fcdbfad231"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


// 🔄 OBSŁUGA SESJI
onAuthStateChanged(auth, async (user) => {

  if (user) {

    authBox.style.display = "none";
    userPanel.style.display = "block";

    let login = user.displayName || "Użytkownik";

    try {
      const snap = await getDoc(doc(db, "users", user.uid));
      if (snap.exists()) {
        login = snap.data().login;
      }
    } catch {}

    welcomeText.innerText = "Witaj, " + login + " 😎";

  } else {
    authBox.style.display = "block";
    userPanel.style.display = "none";
  }
});


// 🔵 GOOGLE LOGIN
document.getElementById("googleLogin").onclick = async () => {
  const provider = new GoogleAuthProvider();

  try {
    const result = await signInWithPopup(auth, provider);
    const user = result.user;

    const snap = await getDoc(doc(db, "users", user.uid));

    if (!snap.exists()) {
      let nick = prompt("Podaj login:");

      if (!nick || nick.length < 3) return;

      const check = await getDoc(doc(db, "logins", nick));
      if (check.exists()) {
        alert("Login zajęty");
        return;
      }

      await setDoc(doc(db, "users", user.uid), {
        login: nick,
        email: user.email
      });

      await setDoc(doc(db, "logins", nick), {
        uid: user.uid,
        email: user.email
      });
    }

  } catch (e) {
    loginInfo.innerText = "Błąd Google";
    loginInfo.style.color = "red";
  }
};


// 🟢 LOGIN EMAIL / LOGIN
document.getElementById("loginBtn").onclick = async () => {
  const input = loginEmail.value.trim();
  const pass = password.value;

  loginInfo.innerText = "";

  let email = input;

  try {
    if (!input.includes("@")) {
      const snap = await getDoc(doc(db, "logins", input));

      if (!snap.exists()) {
        loginInfo.innerText = "Login nie istnieje";
        loginInfo.style.color = "red";
        return;
      }

      email = snap.data().email;
    }

    await signInWithEmailAndPassword(auth, email, pass);

  } catch (e) {
    loginInfo.innerText = "Błędne dane logowania";
    loginInfo.style.color = "red";
  }
};


// 🔁 RESET HASŁA
document.getElementById("resetBtn").onclick = async () => {
  const input = loginEmail.value.trim();

  resetInfo.innerText = "";

  if (!input) {
    resetInfo.innerText = "Podaj email lub login";
    resetInfo.style.color = "red";
    return;
  }

  let email = input;

  try {
    if (!input.includes("@")) {
      const snap = await getDoc(doc(db, "logins", input));

      if (!snap.exists()) {
        resetInfo.innerText = "Login nie istnieje";
        resetInfo.style.color = "red";
        return;
      }

      email = snap.data().email;
    }

    await sendPasswordResetEmail(auth, email);

    resetInfo.innerText = "📩 Email do resetu wysłany!";
    resetInfo.style.color = "lightgreen";

  } catch (e) {
    resetInfo.innerText = "Błąd: " + e.message;
    resetInfo.style.color = "red";
  }
};


// 🔴 WYLOGUJ
document.getElementById("logoutBtn").onclick = () => {
  signOut(auth);
};
</script>

</body>
</html>
