<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Hub Krzyżówki</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 20px auto;
      padding: 12px 20px;
      background: white;
      color: #111;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .google-btn:hover {
      background: #e5e7eb;
    }

    .auth-box input {
      width: 80%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin: 5px 0;
    }

    .auth-box button {
      margin: 5px;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    #login-email {
      background: #22c55e;
    }

    #register-email {
      background: #3b82f6;
      color: white;
    }

    .user-box {
      margin-top: 20px;
    }

    #logout {
      margin-top: 10px;
      padding: 8px 16px;
      background: #ef4444;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .links {
      margin-top: 20px;
      font-size: 14px;
      opacity: 0.6;
    }

    .links a {
      color: #22c55e;
      text-decoration: none;
      margin: 0 10px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🧩 Hub Krzyżówki</h1>
    <p>Witamy 🚀</p>

    <!-- GOOGLE -->
    <button id="google-login" class="google-btn">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
      Zaloguj się przez Google
    </button>

    <!-- EMAIL -->
    <div class="auth-box">
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Hasło">

      <button id="login-email">Zaloguj</button>
      <button id="register-email">Zarejestruj</button>
    </div>

    <div id="user-box" class="user-box"></div>

    <div class="links">
      <a href="/privacy.html">Polityka prywatności</a> |
      <a href="/terms.html">Regulamin</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { 
      getAuth, 
      signInWithPopup, 
      GoogleAuthProvider,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBM-llo5yOdrwBbuAgGhspesvbqXOnM5go",
  authDomain: "hub-krzyzowki.firebaseapp.com",
  databaseURL: "https://hub-krzyzowki-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "hub-krzyzowki",
  storageBucket: "hub-krzyzowki.firebasestorage.app",
  messagingSenderId: "836287595684",
  appId: "1:836287595684:web:c6918e92dd86fcdbfad231"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const loginBtn = document.getElementById("google-login");
    const userBox = document.getElementById("user-box");

    // GOOGLE LOGIN
    loginBtn.onclick = () => {
      signInWithPopup(auth, provider)
        .catch(err => alert("Błąd: " + err.message));
    };

    // REGISTER
    document.getElementById("register-email").onclick = () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email.includes("@")) {
        alert("Podaj poprawny email!");
        return;
      }

      if (password.length < 6) {
        alert("Hasło musi mieć min. 6 znaków!");
        return;
      }

      createUserWithEmailAndPassword(auth, email, password)
        .catch(err => alert("Błąd: " + err.message));
    };

    // LOGIN
    document.getElementById("login-email").onclick = () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email.includes("@")) {
        alert("Podaj poprawny email!");
        return;
      }

      signInWithEmailAndPassword(auth, email, password)
        .catch(err => alert("Błąd: " + err.message));
    };

    // STATE
    onAuthStateChanged(auth, user => {
      if (user) {
        loginBtn.style.display = "none";

        userBox.innerHTML = `
          <p>Zalogowany jako:<br><b>${user.email || user.displayName}</b></p>
          <button id="logout">Wyloguj</button>
        `;

        document.getElementById("logout").onclick = () => {
          signOut(auth);
        };

      } else {
        loginBtn.style.display = "flex";
        userBox.innerHTML = "";
      }
    });
  </script>
</body>
</html>
